version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hospital_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hospital_registry
      MYSQL_USER: hospital_user
      MYSQL_PASSWORD: hospital_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # 将初始化脚本挂载到该目录，如果数据库为空，MySQL 容器启动时会自动执行该脚本
      - ./backend/数据库初始化脚本/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
